name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macos-arm64
          - platform: macos-latest
            target: x86_64-apple-darwin
            label: macos-x64
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: linux

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Notes ${{ github.ref_name }}'
          releaseBody: |
            ## Notes ${{ github.ref_name }}

            ### 下载说明
            - **Windows**: 下载 `.msi` 或 `-setup.exe` 安装包
            - **macOS**: 下载 `.dmg` 文件（ARM64 为 Apple Silicon，x64 为 Intel）
            - **Linux**: 下载 `.deb` 或 `.AppImage` 文件
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}

  updater:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') && secrets.TAURI_SIGNING_PRIVATE_KEY != ''
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Generate latest.json
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Try to download signatures from release assets
          get_signature() {
            local asset_name=$1
            local sig_url="https://github.com/feiyonggao/notes/releases/download/v${VERSION}/${asset_name}.sig"
            local sig=$(curl -sL -w "%{http_code}" "$sig_url" 2>/dev/null)
            local http_code="${sig: -3}"
            if [ "$http_code" = "200" ]; then
              echo "${sig%???}"
            else
              echo ""
            fi
          }

          # Get signatures
          WINDOWS_SIG=$(get_signature "Notes_${VERSION}_x64-setup.nsis.zip")
          MACOS_ARM64_SIG=$(get_signature "Notes_${VERSION}_aarch64.app.tar.gz")
          MACOS_X64_SIG=$(get_signature "Notes_${VERSION}_x64.app.tar.gz")
          LINUX_SIG=$(get_signature "Notes_${VERSION}_amd64.AppImage.tar.gz")

          cat > latest.json << EOF
          {
            "version": "${VERSION}",
            "notes": "Notes v${VERSION} 更新",
            "pub_date": "${PUB_DATE}",
            "platforms": {
              "windows-x86_64": {
                "signature": "${WINDOWS_SIG}",
                "url": "https://github.com/feiyonggao/notes/releases/download/v${VERSION}/Notes_${VERSION}_x64-setup.nsis.zip"
              },
              "darwin-x86_64": {
                "signature": "${MACOS_X64_SIG}",
                "url": "https://github.com/feiyonggao/notes/releases/download/v${VERSION}/Notes_${VERSION}_x64.app.tar.gz"
              },
              "darwin-aarch64": {
                "signature": "${MACOS_ARM64_SIG}",
                "url": "https://github.com/feiyonggao/notes/releases/download/v${VERSION}/Notes_${VERSION}_aarch64.app.tar.gz"
              },
              "linux-x86_64": {
                "signature": "${LINUX_SIG}",
                "url": "https://github.com/feiyonggao/notes/releases/download/v${VERSION}/Notes_${VERSION}_amd64.AppImage.tar.gz"
              }
            }
          }
          EOF

          echo "Generated latest.json:"
          cat latest.json

      - name: Upload latest.json to release
        uses: softprops/action-gh-release@v2
        with:
          files: latest.json
          tag_name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
