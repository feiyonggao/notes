<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E0E0E0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#BDBDBD;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="3" dy="3" stdDeviation="8" flood-color="#00000040"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 背景圆角方形 -->
  <rect x="20" y="20" width="472" height="472" rx="80" ry="80" fill="#F5F5F5"/>

  <!-- 内部毛玻璃效果 -->
  <rect x="40" y="40" width="432" height="432" rx="65" ry="65"
        fill="rgba(255,255,255,0.85)" stroke="#E0E0E0" stroke-width="2"/>

  <!-- 装饰性光晕 -->
  <circle cx="400" cy="120" r="80" fill="rgba(255,255,255,0.4)"/>
  <circle cx="120" cy="400" r="60" fill="rgba(255,255,255,0.3)"/>

  <!-- 主文字 N -->
  <text x="256" y="240" text-anchor="middle" font-family="Arial, Helvetica, sans-serif"
        font-size="180" font-weight="bold" fill="#424242" filter="url(#shadow)">N</text>

  <!-- 副标题 Notes -->
  <text x="256" y="310" text-anchor="middle" font-family="Arial, Helvetica, sans-serif"
        font-size="48" fill="#757575" letter-spacing="8">Notes</text>

  <!-- 装饰线条 -->
  <rect x="150" y="340" width="212" height="4" rx="2" fill="#E0E0E0"/>
  <rect x="170" y="360" width="172" height="3" rx="1.5" fill="#EEEEEE"/>
  <rect x="190" y="375" width="132" height="3" rx="1.5" fill="#EEEEEE"/>

  <!-- 右上角对勾 -->
  <circle cx="400" cy="112" r="45" fill="#4CAF50" filter="url(#shadow)"/>
  <path d="M 378 112 L 392 126 L 422 96" fill="none" stroke="white"
        stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 左下角装饰 -->
  <circle cx="120" cy="400" r="25" fill="rgba(76, 175, 80, 0.2)"/>
  <circle cx="120" cy="400" r="12" fill="rgba(76, 175, 80, 0.3)"/>
</svg>