<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFE082;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFD54F;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#81D4FA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4FC3F7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A5D6A7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#66BB6A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F48FB1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EC407A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#CE93D8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#AB47BC;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFAB91;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF7043;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="2" dy="2" stdDeviation="4" flood-color="#00000030"/>
    </filter>
  </defs>

  <!-- 标题 -->
  <text x="600" y="40" text-anchor="middle" font-family="Arial" font-size="24" font-weight="bold" fill="#333">选择一个图标风格</text>

  <!-- 图标 1: 经典便签 -->
  <g transform="translate(50, 70)" filter="url(#shadow)">
    <rect x="0" y="0" width="120" height="140" rx="8" ry="8" fill="url(#grad1)"/>
    <path d="M 90 0 L 120 30 L 90 30 Z" fill="#FFC107"/>
    <line x1="20" y1="40" x2="100" y2="40" stroke="#E6C860" stroke-width="2"/>
    <line x1="20" y1="55" x2="100" y2="55" stroke="#E6C860" stroke-width="2"/>
    <line x1="20" y1="70" x2="100" y2="70" stroke="#E6C860" stroke-width="2"/>
    <line x1="20" y1="85" x2="80" y2="85" stroke="#E6C860" stroke-width="2"/>
    <circle cx="60" cy="-10" r="15" fill="#F44336" stroke="#D32F2F" stroke-width="2"/>
    <circle cx="60" cy="-10" r="6" fill="#FFCDD2"/>
    <text x="60" y="170" text-anchor="middle" font-family="Arial" font-size="12" fill="#666">1. 经典便签</text>
  </g>

  <!-- 图标 2: 现代简约 -->
  <g transform="translate(220, 70)" filter="url(#shadow)">
    <rect x="0" y="0" width="120" height="140" rx="12" ry="12" fill="url(#grad2)"/>
    <path d="M 80 0 C 80 0 120 0 120 40 L 80 40 Z" fill="#29B6F6"/>
    <text x="60" y="65" text-anchor="middle" font-family="Arial" font-size="28" font-weight="bold" fill="white">N</text>
    <rect x="25" y="80" width="70" height="4" rx="2" fill="rgba(255,255,255,0.6)"/>
    <rect x="25" y="92" width="50" height="4" rx="2" fill="rgba(255,255,255,0.6)"/>
    <rect x="25" y="104" width="60" height="4" rx="2" fill="rgba(255,255,255,0.6)"/>
    <text x="60" y="170" text-anchor="middle" font-family="Arial" font-size="12" fill="#666">2. 现代简约</text>
  </g>

  <!-- 图标 3: 3D 立体 -->
  <g transform="translate(390, 70)" filter="url(#shadow)">
    <path d="M 10 20 L 110 20 L 110 140 L 10 140 Z" fill="#E0E0E0"/>
    <rect x="0" y="0" width="110" height="130" rx="6" ry="6" fill="url(#grad3)"/>
    <path d="M 75 0 L 110 35 L 75 35 Z" fill="#43A047"/>
    <path d="M 75 0 L 110 35" fill="none" stroke="#388E3C" stroke-width="1"/>
    <circle cx="55" cy="50" r="20" fill="white" opacity="0.3"/>
    <text x="55" y="57" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="white">✓</text>
    <line x1="25" y1="90" x2="85" y2="90" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
    <line x1="25" y1="102" x2="70" y2="102" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
    <text x="60" y="170" text-anchor="middle" font-family="Arial" font-size="12" fill="#666">3. 3D 立体</text>
  </g>

  <!-- 图标 4: 渐变彩色 -->
  <g transform="translate(560, 70)" filter="url(#shadow)">
    <rect x="0" y="0" width="120" height="140" rx="10" ry="10" fill="url(#grad4)"/>
    <rect x="15" y="20" width="90" height="3" rx="1.5" fill="rgba(255,255,255,0.7)"/>
    <rect x="15" y="32" width="75" height="3" rx="1.5" fill="rgba(255,255,255,0.7)"/>
    <rect x="15" y="44" width="85" height="3" rx="1.5" fill="rgba(255,255,255,0.7)"/>
    <circle cx="90" cy="100" r="25" fill="white" opacity="0.3"/>
    <text x="90" y="107" text-anchor="middle" font-family="Arial" font-size="24" fill="white">+</text>
    <text x="60" y="170" text-anchor="middle" font-family="Arial" font-size="12" fill="#666">4. 渐变彩色</text>
  </g>

  <!-- 图标 5: 紫色优雅 -->
  <g transform="translate(730, 70)" filter="url(#shadow)">
    <rect x="0" y="0" width="120" height="140" rx="15" ry="15" fill="url(#grad5)"/>
    <path d="M 20 30 Q 60 10 100 30" fill="none" stroke="white" stroke-width="3" stroke-linecap="round"/>
    <path d="M 20 50 Q 60 30 100 50" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="2" stroke-linecap="round"/>
    <circle cx="60" cy="90" r="20" fill="white" opacity="0.3"/>
    <path d="M 50 90 L 55 95 L 70 80" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="60" y="170" text-anchor="middle" font-family="Arial" font-size="12" fill="#666">5. 紫色优雅</text>
  </g>

  <!-- 图标 6: 橙色活力 -->
  <g transform="translate(900, 70)" filter="url(#shadow)">
    <rect x="0" y="0" width="120" height="140" rx="8" ry="8" fill="url(#grad6)"/>
    <path d="M 85 0 L 120 35 L 85 35 Z" fill="#E64A19"/>
    <rect x="20" y="50" width="80" height="8" rx="4" fill="white" opacity="0.5"/>
    <rect x="20" y="65" width="60" height="8" rx="4" fill="white" opacity="0.5"/>
    <rect x="20" y="80" width="70" height="8" rx="4" fill="white" opacity="0.5"/>
    <rect x="20" y="95" width="50" height="8" rx="4" fill="white" opacity="0.5"/>
    <circle cx="95" cy="110" r="18" fill="#FF5722" stroke="white" stroke-width="2"/>
    <text x="95" y="116" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="white">✎</text>
    <text x="60" y="170" text-anchor="middle" font-family="Arial" font-size="12" fill="#666">6. 橙色活力</text>
  </g>

  <!-- 图标 7: 扁平化设计 -->
  <g transform="translate(50, 270)" filter="url(#shadow)">
    <rect x="0" y="0" width="120" height="100" rx="4" ry="4" fill="#2196F3"/>
    <rect x="5" y="5" width="110" height="90" rx="2" ry="2" fill="#E3F2FD"/>
    <rect x="15" y="20" width="60" height="4" rx="2" fill="#1976D2"/>
    <rect x="15" y="30" width="80" height="4" rx="2" fill="#64B5F6"/>
    <rect x="15" y="40" width="70" height="4" rx="2" fill="#64B5F6"/>
    <rect x="15" y="50" width="50" height="4" rx="2" fill="#64B5F6"/>
    <circle cx="90" cy="75" r="15" fill="#FF9800" stroke="white" stroke-width="2"/>
    <text x="90" y="81" text-anchor="middle" font-family="Arial" font-size="16" fill="white">+</text>
    <text x="60" y="120" text-anchor="middle" font-family="Arial" font-size="12" fill="#666">7. 扁平化设计</text>
  </g>

  <!-- 图标 8: 毛玻璃效果 -->
  <g transform="translate(220, 250)" filter="url(#shadow)">
    <rect x="0" y="0" width="120" height="120" rx="20" ry="20" fill="#F5F5F5"/>
    <rect x="10" y="10" width="100" height="100" rx="15" ry="15" fill="rgba(255,255,255,0.8)" stroke="#E0E0E0" stroke-width="1"/>
    <text x="60" y="55" text-anchor="middle" font-family="Arial" font-size="36" font-weight="bold" fill="#424242">N</text>
    <text x="60" y="75" text-anchor="middle" font-family="Arial" font-size="12" fill="#757575">Notes</text>
    <circle cx="95" cy="25" r="10" fill="#4CAF50"/>
    <text x="95" y="29" text-anchor="middle" font-family="Arial" font-size="12" fill="white">✓</text>
    <text x="60" y="140" text-anchor="middle" font-family="Arial" font-size="12" fill="#666">8. 毛玻璃效果</text>
  </g>

  <!-- 图标 9: 渐变现代化 -->
  <g transform="translate(390, 240)" filter="url(#shadow)">
    <defs>
      <linearGradient id="grad7" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
        <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
      </linearGradient>
    </defs>
    <rect x="0" y="0" width="120" height="120" rx="25" ry="25" fill="url(#grad7)"/>
    <rect x="20" y="30" width="80" height="5" rx="2.5" fill="rgba(255,255,255,0.8)"/>
    <rect x="20" y="42" width="65" height="5" rx="2.5" fill="rgba(255,255,255,0.6)"/>
    <rect x="20" y="54" width="75" height="5" rx="2.5" fill="rgba(255,255,255,0.6)"/>
    <rect x="20" y="66" width="55" height="5" rx="2.5" fill="rgba(255,255,255,0.6)"/>
    <circle cx="85" cy="90" r="18" fill="rgba(255,255,255,0.3)"/>
    <text x="85" y="96" text-anchor="middle" font-family="Arial" font-size="20" fill="white">✏</text>
    <text x="60" y="140" text-anchor="middle" font-family="Arial" font-size="12" fill="#666">9. 渐变现代化</text>
  </g>

  <!-- 图标 10: 简约方形 -->
  <g transform="translate(560, 240)" filter="url(#shadow)">
    <rect x="0" y="0" width="120" height="120" rx="8" ry="8" fill="white" stroke="#E0E0E0" stroke-width="2"/>
    <rect x="0" y="0" width="120" height="35" rx="8" ry="8" fill="#FFC107"/>
    <rect x="0" y="27" width="120" height="8" fill="#FFC107"/>
    <text x="60" y="26" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="white">📝 Notes</text>
    <rect x="15" y="50" width="90" height="3" rx="1.5" fill="#FFD54F"/>
    <rect x="15" y="60" width="75" height="3" rx="1.5" fill="#FFD54F"/>
    <rect x="15" y="70" width="85" height="3" rx="1.5" fill="#FFD54F"/>
    <rect x="15" y="80" width="60" height="3" rx="1.5" fill="#FFD54F"/>
    <text x="60" y="140" text-anchor="middle" font-family="Arial" font-size="12" fill="#666">10. 简约方形</text>
  </g>

  <!-- 图标 11: 圆形图标 -->
  <g transform="translate(730, 240)" filter="url(#shadow)">
    <circle cx="60" cy="60" r="55" fill="#FF7043"/>
    <circle cx="60" cy="60" r="48" fill="#FF8A65"/>
    <rect x="30" y="35" width="60" height="4" rx="2" fill="white"/>
    <rect x="30" y="45" width="50" height="4" rx="2" fill="rgba(255,255,255,0.7)"/>
    <rect x="30" y="55" width="55" height="4" rx="2" fill="rgba(255,255,255,0.7)"/>
    <rect x="30" y="65" width="45" height="4" rx="2" fill="rgba(255,255,255,0.7)"/>
    <circle cx="80" cy="80" r="15" fill="white" opacity="0.4"/>
    <text x="80" y="86" text-anchor="middle" font-family="Arial" font-size="18" fill="white">+</text>
    <text x="60" y="135" text-anchor="middle" font-family="Arial" font-size="12" fill="#666">11. 圆形图标</text>
  </g>

  <!-- 图标 12: 渐变圆形 -->
  <g transform="translate(900, 240)" filter="url(#shadow)">
    <defs>
      <linearGradient id="grad8" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
        <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
      </linearGradient>
    </defs>
    <circle cx="60" cy="60" r="55" fill="url(#grad8)"/>
    <path d="M 35 40 L 85 40 L 85 90 L 60 75 L 35 90 Z" fill="white" opacity="0.9"/>
    <path d="M 60 75 L 85 90 L 60 90 Z" fill="rgba(255,255,255,0.7)"/>
    <text x="60" y="135" text-anchor="middle" font-family="Arial" font-size="12" fill="#666">12. 渐变圆形</text>
  </g>
</svg>