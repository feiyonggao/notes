<!DOCTYPE html>
<html>
<head>
    <title>Notes 图标生成器</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }
        .preview-section {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 40px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }
        .icon-preview {
            width: 200px;
            height: 200px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }
        .icon-preview svg {
            width: 100%;
            height: 100%;
        }
        .icon-sizes {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 15px;
        }
        .size-item {
            text-align: center;
            padding: 10px;
            background: #f5f5f5;
            border-radius: 10px;
        }
        .size-item canvas {
            display: block;
            margin: 0 auto 8px;
            border-radius: 4px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .size-item span {
            font-size: 11px;
            color: #666;
        }
        .actions {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }
        .btn {
            padding: 15px 30px;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.5);
        }
        .btn-secondary {
            background: #f5f5f5;
            color: #333;
        }
        .btn-secondary:hover {
            background: #e0e0e0;
        }
        .btn-success {
            background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
            color: white;
        }
        .btn-success:hover {
            transform: translateY(-2px);
        }
        .instructions {
            background: #f9f9f9;
            border-radius: 15px;
            padding: 25px;
            margin-top: 30px;
        }
        .instructions h3 {
            color: #333;
            margin-bottom: 15px;
        }
        .instructions ol {
            padding-left: 20px;
            color: #555;
            line-height: 1.8;
        }
        .instructions code {
            background: #e8e8e8;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 14px;
        }
        .download-links {
            display: none;
            margin-top: 20px;
            padding: 20px;
            background: #e8f5e9;
            border-radius: 10px;
        }
        .download-links.show {
            display: block;
        }
        .download-links a {
            display: inline-block;
            margin: 5px;
            padding: 10px 20px;
            background: #4CAF50;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-size: 14px;
        }
        .download-links a:hover {
            background: #45a049;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📝 Notes 图标生成器</h1>
        <p class="subtitle">毛玻璃效果图标 - 生成各尺寸 PNG 和 ICO 文件</p>

        <div class="preview-section">
            <div class="icon-preview" id="mainPreview"></div>
            <div class="icon-sizes" id="sizePreview"></div>
        </div>

        <div class="actions">
            <button class="btn btn-primary" onclick="generateAllIcons()">🎨 生成所有图标</button>
            <button class="btn btn-success" onclick="downloadAllPNG()">📥 下载所有 PNG</button>
            <button class="btn btn-secondary" onclick="generateICO()">💿 生成 ICO 文件</button>
        </div>

        <div class="download-links" id="downloadLinks">
            <h3>✅ 图标已生成！</h3>
            <p>点击下方链接下载单个文件：</p>
            <div id="linksContainer"></div>
        </div>

        <div class="instructions">
            <h3>📋 使用说明</h3>
            <ol>
                <li>点击"🎨 生成所有图标"按钮生成各尺寸 PNG</li>
                <li>点击"📥 下载所有 PNG"下载所有 PNG 文件</li>
                <li>点击"💿 生成 ICO 文件"生成 Windows 图标文件</li>
                <li>将下载的文件复制到 <code>src-tauri/icons/</code> 目录</li>
                <li>运行 <code>npm run tauri build</code> 重新构建应用</li>
            </ol>
        </div>
    </div>

    <script>
        // 毛玻璃效果图标 SVG
        const svgContent = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
            <defs>
                <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
                    <feDropShadow dx="3" dy="3" stdDeviation="8" flood-color="#00000040"/>
                </filter>
            </defs>
            <rect x="20" y="20" width="472" height="472" rx="80" ry="80" fill="#F5F5F5"/>
            <rect x="40" y="40" width="432" height="432" rx="65" ry="65" fill="rgba(255,255,255,0.85)" stroke="#E0E0E0" stroke-width="2"/>
            <circle cx="400" cy="120" r="80" fill="rgba(255,255,255,0.4)"/>
            <circle cx="120" cy="400" r="60" fill="rgba(255,255,255,0.3)"/>
            <text x="256" y="240" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="180" font-weight="bold" fill="#424242" filter="url(#shadow)">N</text>
            <text x="256" y="310" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="48" fill="#757575" letter-spacing="8">Notes</text>
            <rect x="150" y="340" width="212" height="4" rx="2" fill="#E0E0E0"/>
            <rect x="170" y="360" width="172" height="3" rx="1.5" fill="#EEEEEE"/>
            <rect x="190" y="375" width="132" height="3" rx="1.5" fill="#EEEEEE"/>
            <circle cx="400" cy="112" r="45" fill="#4CAF50" filter="url(#shadow)"/>
            <path d="M 378 112 L 392 126 L 422 96" fill="none" stroke="white" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="120" cy="400" r="25" fill="rgba(76, 175, 80, 0.2)"/>
            <circle cx="120" cy="400" r="12" fill="rgba(76, 175, 80, 0.3)"/>
        </svg>`;

        // 需要的图标尺寸
        const iconSizes = [
            { name: '32x32', size: 32 },
            { name: '44x44', size: 44 },
            { name: '71x71', size: 71 },
            { name: '89x89', size: 89 },
            { name: '107x107', size: 107 },
            { name: '128x128', size: 128 },
            { name: '142x142', size: 142 },
            { name: '150x150', size: 150 },
            { name: '284x284', size: 284 },
            { name: '310x310', size: 310 },
            { name: '512x512', size: 512 }
        ];

        const generatedIcons = {};

        // 初始化预览
        window.onload = function() {
            // 显示主预览
            const mainPreview = document.getElementById('mainPreview');
            mainPreview.innerHTML = svgContent;

            // 显示尺寸预览
            const sizePreview = document.getElementById('sizePreview');
            iconSizes.forEach(icon => {
                const div = document.createElement('div');
                div.className = 'size-item';
                div.innerHTML = `
                    <canvas id="canvas-${icon.name}" width="${Math.min(icon.size, 60)}" height="${Math.min(icon.size, 60)}"></canvas>
                    <span>${icon.name}</span>
                `;
                sizePreview.appendChild(div);
            });

            // 生成预览图
            generatePreviews();
        };

        function generatePreviews() {
            iconSizes.forEach(icon => {
                const canvas = document.getElementById(`canvas-${icon.name}`);
                if (!canvas) return;

                const ctx = canvas.getContext('2d');
                const img = new Image();
                const svgBlob = new Blob([svgContent], { type: 'image/svg+xml' });
                const url = URL.createObjectURL(svgBlob);

                img.onload = function() {
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    URL.revokeObjectURL(url);
                };

                img.src = url;
            });
        }

        function generateAllIcons() {
            const linksContainer = document.getElementById('linksContainer');
            linksContainer.innerHTML = '';

            let count = 0;
            const total = iconSizes.length;

            iconSizes.forEach(icon => {
                const canvas = document.createElement('canvas');
                canvas.width = icon.size;
                canvas.height = icon.size;
                const ctx = canvas.getContext('2d');
                const img = new Image();
                const svgBlob = new Blob([svgContent], { type: 'image/svg+xml' });
                const url = URL.createObjectURL(svgBlob);

                img.onload = function() {
                    ctx.drawImage(img, 0, 0, icon.size, icon.size);
                    URL.revokeObjectURL(url);

                    generatedIcons[icon.name] = canvas.toDataURL('image/png');

                    // 添加下载链接
                    const link = document.createElement('a');
                    link.href = generatedIcons[icon.name];
                    link.download = `${icon.name}.png`;
                    link.textContent = `${icon.name}.png`;
                    linksContainer.appendChild(link);

                    count++;
                    if (count === total) {
                        document.getElementById('downloadLinks').classList.add('show');
                        alert(`✅ 已生成 ${total} 个 PNG 文件！\n\n点击"📥 下载所有 PNG"批量下载，或在下方单独下载。`);
                    }
                };

                img.src = url;
            });

            // 生成额外的文件名
            const extraNames = [
                'Square30x30Logo', 'Square44x44Logo', 'Square71x71Logo',
                'Square89x89Logo', 'Square107x107Logo', 'Square128x128Logo',
                'Square142x142Logo', 'Square150x150Logo', 'Square284x284Logo',
                'Square310x310Logo', 'StoreLogo', '128x128@2x', 'icon'
            ];
        }

        function downloadAllPNG() {
            if (Object.keys(generatedIcons).length === 0) {
                alert('请先点击"🎨 生成所有图标"按钮！');
                return;
            }

            // 下载所有尺寸
            Object.entries(generatedIcons).forEach(([name, dataUrl]) => {
                const link = document.createElement('a');
                link.href = dataUrl;
                link.download = `${name}.png`;
                link.click();
            });

            // 额外生成特殊名称的文件
            setTimeout(() => {
                // 128x128@2x.png (256x256)
                generateAndDownload(256, '128x128@2x.png');

                // icon.png (512x512)
                generateAndDownload(512, 'icon.png');

                // StoreLogo.png (50x50)
                generateAndDownload(50, 'StoreLogo.png');

                // Square 系列
                const squareSizes = [30, 44, 71, 89, 107, 128, 142, 150, 284, 310];
                squareSizes.forEach(size => {
                    generateAndDownload(size, `Square${size}x${size}Logo.png`);
                });
            }, 500);

            alert('📥 PNG 文件下载已开始！\n\n请将所有文件复制到 src-tauri/icons/ 目录');
        }

        function generateAndDownload(size, filename) {
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');
            const img = new Image();
            const svgBlob = new Blob([svgContent], { type: 'image/svg+xml' });
            const url = URL.createObjectURL(svgBlob);

            img.onload = function() {
                ctx.drawImage(img, 0, 0, size, size);
                URL.revokeObjectURL(url);

                const link = document.createElement('a');
                link.href = canvas.toDataURL('image/png');
                link.download = filename;
                link.click();
            };

            img.src = url;
        }

        function generateICO() {
            alert('💿 ICO 文件生成说明：\n\n' +
                '1. 下载 PNG 文件后，访问在线转换工具：\n' +
                '   - https://convertico.com/\n' +
                '   - https://www.icoconvert.com/\n\n' +
                '2. 上传 256x256 或 512x512 的 PNG 文件\n\n' +
                '3. 选择 ICO 格式并下载\n\n' +
                '4. 将生成的 icon.ico 复制到 src-tauri/icons/ 目录');
        }
    </script>
</body>
</html>
